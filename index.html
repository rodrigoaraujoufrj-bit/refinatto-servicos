<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refinatto — Serviços & Anúncios</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const SUPABASE_URL = 'https://lrksdcydpsvdqzmxildj.supabase.co'
  const SUPABASE_KEY = 'sb_publishable_iNtDghLkTdaR_7ivvM3Ipw_HHijgbIL' 

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
  let currentUser = null;
</script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #141210; --paper: #F7F3ED; --card: #FDFAF6;
  --gold: #B8862A; --gold-light: #F0E0B8; --gold-pale: #FAF3E2;
  --forest: #1E3A2F; --forest-mid: #2E5943; --forest-light: #D4E8DC;
  --border: #E5DDD0; --muted: #8A7E72; --wpp: #25D366;
  --red: #C0392B; --red-light: #FDECEA;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:var(--paper); font-family:'Plus Jakarta Sans',sans-serif; color:var(--ink); max-width:430px; margin:0 auto; min-height:100vh; border-left:1px solid var(--border); border-right:1px solid var(--border); }

/* UI COMPONENTS */
.topbar { position:sticky; top:0; z-index:50; background:var(--ink); display:flex; align-items:center; justify-content:space-between; padding:0 20px; height:56px; }
.brand { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; color:var(--gold); }
.btn-offer { background:var(--gold); color:var(--ink); border:none; border-radius:100px; padding:7px 16px; font-size:12px; font-weight:600; cursor:pointer; }
.btn-login { background:transparent; border:1px solid var(--gold); color:var(--gold); margin-right:8px; }

.hero { background:var(--forest); padding:32px 20px 28px; color:white; }
.hero h1 { font-family:'Playfair Display',serif; font-size:26px; margin-bottom:18px; }
.hero h1 em { color:var(--gold); font-style:italic; }
.search-wrap { display:flex; background:white; border-radius:12px; overflow:hidden; }
.search-wrap input { flex:1; border:none; padding:13px 16px; outline:none; }
.search-wrap button { background:var(--gold); border:none; padding:0 18px; }

.stats-bar { display:flex; background:var(--gold-pale); border-bottom:1px solid var(--gold-light); padding:10px 20px; text-align:center; }
.stat { flex:1; }
.stat-num { font-family:'Playfair Display',serif; font-size:20px; color:var(--gold); }
.stat-label { font-size:10px; color:var(--muted); }

/* CARDS */
.section { padding:24px 20px 0; }
.sec-title { font-family:'Playfair Display',serif; font-size:19px; margin-bottom:14px; display:block; }
.plist { display:flex; flex-direction:column; gap:10px; padding-bottom:100px; }
.pcard { background:var(--card); border:1.5px solid var(--border); border-radius:16px; padding:16px; display:flex; gap:12px; align-items:center; }
.pcard-avatar { width:48px; height:48px; background:#eee; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
.pcard-body { flex:1; min-width:0; }
.pcard-name { font-family:'Playfair Display',serif; font-size:15px; font-weight:700; }
.pcard-svc { font-size:12px; color:var(--muted); margin-bottom:4px; }

/* MODAL & FORM */
.overlay { position:fixed; inset:0; background:rgba(20,18,16,0.95); z-index:100; display:none; padding:20px; overflow-y:auto; }
.overlay.open { display:block; }
.modal-card { background:var(--paper); border-radius:24px; padding:24px; margin-top:40px; }
.modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.cad-step { display:none; }
.cad-step.active { display:block; }
.field { margin-bottom:15px; }
.field label { display:block; font-size:10px; font-weight:700; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
.field input, .field select, .field textarea { width:100%; padding:12px; border:1px solid var(--border); border-radius:10px; font-family:inherit; outline:none; }
.btn-full { width:100%; padding:14px; border-radius:12px; border:none; font-weight:700; cursor:pointer; margin-top:10px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">Refinatto<sup>serviços</sup></div>
  <div id="authArea">
    <button id="btnLogin" class="btn-offer btn-login" onclick="loginGoogle()">Entrar</button>
    <button id="btnAnunciar" class="btn-offer" style="display:none" onclick="openCad()">+ Anunciar</button>
  </div>
</div>

<div class="hero">
  <h1>Anúncios dos seus <em>vizinhos</em></h1>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="O que você procura?" oninput="applyFilters()">
    <button>🔍</button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat"><div class="stat-num" id="totalCount">0</div><div class="stat-label">Anúncios</div></div>
  <div class="stat"><div class="stat-num">Grátis</div><div class="stat-label">Para Moradores</div></div>
</div>

<div class="section">
  <span class="sec-title">Recentes</span>
  <div class="plist" id="plist"></div>
</div>

<div class="overlay" id="cadOverlay">
  <div class="modal-card">
    <div class="modal-header">
      <h2 style="font-family:'Playfair Display';">Novo Anúncio</h2>
      <button style="background:none; border:none; font-size:24px;" onclick="closeModal('cadOverlay')">×</button>
    </div>

    <div class="cad-step active" id="step0">
      <p style="font-size:13px; margin-bottom:15px; color:var(--muted);">Passo 1: Identificação</p>
      <div class="field">
        <label>Seu Nome</label>
        <input type="text" id="cadNome" placeholder="Como quer ser chamado?">
      </div>
      <div class="field">
        <label>WhatsApp (com DDD)</label>
        <input type="tel" id="cadWpp" placeholder="Ex: 21999999999">
      </div>
      <div class="field">
        <label>Seu Bloco</label>
        <input type="text" id="cadBloco" placeholder="Ex: Bloco 2">
      </div>
      <button class="btn-full" style="background:var(--gold); color:white;" onclick="goStep(1)">Próximo Passo</button>
    </div>

    <div class="cad-step" id="step1">
      <p style="font-size:13px; margin-bottom:15px; color:var(--muted);">Passo 2: O que você oferece?</p>
      <div class="field">
        <label>Título do Anúncio</label>
        <input type="text" id="cadTitulo" placeholder="Ex: Venda de Bolos, Aula de Inglês">
      </div>
      <div class="field">
        <label>Categoria</label>
        <select id="cadCat">
          <option value="Gastronomia">Gastronomia</option>
          <option value="Serviços">Serviços</option>
          <option value="Saúde">Saúde</option>
          <option value="Beleza">Beleza</option>
          <option value="Outros">Outros</option>
        </select>
      </div>
      <div class="field">
        <label>Descrição</label>
        <textarea id="cadDesc" rows="3" placeholder="Conte mais detalhes..."></textarea>
      </div>
      <div style="display:flex; gap:10px;">
        <button class="btn-full" style="background:#eee;" onclick="goStep(0)">Voltar</button>
        <button class="btn-full" style="background:var(--forest); color:white;" onclick="salvarAnuncio()">Publicar Agora</button>
      </div>
    </div>
  </div>
</div>

<script>
// --- AUTH ---
async function loginGoogle() {
  await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: 'https://refinatto-servicos.vercel.app' } });
}

sb.auth.onAuthStateChange((event, session) => {
  if (session) {
    currentUser = session.user;
    document.getElementById('btnLogin').style.display = 'none';
    document.getElementById('btnAnunciar').style.display = 'block';
  } else {
    currentUser = null;
    document.getElementById('btnLogin').style.display = 'block';
    document.getElementById('btnAnunciar').style.display = 'none';
  }
});

// --- DADOS ---
let currentData = [];
async function carregarAnuncios() {
  const { data, error } = await sb.from('anuncios').select('*').order('criado_em', { ascending: false });
  if (!error) { currentData = data; renderList(data); }
}

function renderList(list) {
  const container = document.getElementById('plist');
  container.innerHTML = '';
  document.getElementById('totalCount').textContent = list.length;
  list.forEach(item => {
    const card = document.createElement('div');
    card.className = 'pcard';
    card.innerHTML = `
      <div class="pcard-avatar">👤</div>
      <div class="pcard-body">
        <div class="pcard-name">${item.titulo}</div>
        <div class="pcard-svc">${item.categoria} • ${item.localizacao_bloco || 'Refinatto'}</div>
      </div>
      <button class="btn-wpp" style="background:var(--wpp); color:white; border:none; padding:8px; border-radius:8px; cursor:pointer;" onclick="window.open('https://wa.me/55${item.whatsapp}')">💬</button>
    `;
    container.append(card);
  });
}

// --- FORMULÁRIO ---
function goStep(n) {
  document.querySelectorAll('.cad-step').forEach((s, idx) => s.classList.toggle('active', idx === n));
}

function openCad() { goStep(0); document.getElementById('cadOverlay').classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

async function salvarAnuncio() {
  const payload = {
    titulo: document.getElementById('cadTitulo').value,
    categoria: document.getElementById('cadCat').value,
    descricao: document.getElementById('cadDesc').value,
    whatsapp: document.getElementById('cadWpp').value,
    localizacao_bloco: document.getElementById('cadBloco').value,
    usuario_id: currentUser.id
  };

  const { error } = await sb.from('anuncios').insert([payload]);
  if (error) { alert("Erro: " + error.message); } 
  else { alert("Publicado!"); closeModal('cadOverlay'); carregarAnuncios(); }
}

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  renderList(currentData.filter(i => i.titulo.toLowerCase().includes(q)));
}

window.onload = carregarAnuncios;
</script>
</body>
</html>
