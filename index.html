<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Refinatto Serviços</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --forest: #1E3A2F;
            --gold: #C5A059;
            --paper: #FDFBF7;
            --text: #2D3436;
            --border: #E8E2D6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--paper); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: var(--text);
            line-height: 1.5;
        }

        /* 🌤️ WIDGET DE CLIMA */
        .weather-widget {
            background: var(--forest);
            color: white;
            margin: 20px 20px 10px;
            padding: 20px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 20px rgba(30, 58, 47, 0.15);
        }
        .weather-info { display: flex; flex-direction: column; gap: 4px; }
        .weather-date { font-size: 11px; font-weight: 600; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.5px; }
        .weather-temp { font-size: 36px; font-weight: 800; font-family: 'Playfair Display', serif; line-height: 1; margin: 4px 0; }
        .weather-status { font-size: 13px; font-weight: 500; }
        .weather-icon { font-size: 48px; }

        /* 📣 ESPAÇO PREMIUM (CURADORIA) */
        .pub-container { padding: 0 20px 20px; }
        .pub-banner-recruitment {
            background: #F4F1EA;
            border: 1.5px dashed var(--gold);
            border-radius: 20px;
            padding: 25px 20px;
            text-align: center;
            cursor: default; /* Remove o cursor de clique */
        }
        .pub-title { 
            font-family: 'Playfair Display', serif; 
            font-size: 18px; 
            color: var(--gold); 
            margin-bottom: 5px; 
        }
        .pub-sub { font-size: 13px; color: #888; font-weight: 500; }

        /* 📱 ESTILO DOS ANÚNCIOS (LISTA GERAL) */
        .feed-container { padding: 0 20px 100px; }
        .section-header { 
            font-family: 'Playfair Display', serif; 
            font-size: 22px; 
            margin-bottom: 20px;
            color: var(--forest);
        }
        
        .ad-card {
            background: white;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .ad-image {
            width: 80px; height: 80px;
            border-radius: 15px;
            object-fit: cover;
            background: #eee;
        }
        .ad-info h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
        .ad-info p { font-size: 13px; color: #666; }

        /* 🔍 BARRA DE BUSCA */
        .search-area { padding: 0 20px 20px; }
        .search-bar {
            width: 100%;
            padding: 15px 20px;
            border-radius: 15px;
            border: 1px solid var(--border);
            background: white;
            font-family: inherit;
            font-size: 15px;
        }

    </style>
</head>
<body>

    <div id="weatherArea" style="display:none;">
        <div class="weather-widget">
            <div class="weather-info">
                <span class="weather-date" id="weatherDate">Hoje no Méier</span>
                <span class="weather-temp" id="weatherTemp">--°C</span>
                <span class="weather-status" id="weatherStatus">Carregando...</span>
            </div>
            <div class="weather-icon" id="weatherEmoji">☀️</div>
        </div>
    </div>

    <div class="pub-container" id="premiumSpace">
        <div class="pub-banner-recruitment">
            <div class="pub-title">Espaço Premium 🌟</div>
            <div class="pub-sub">Em breve novidades para esse espaço...</div>
        </div>
    </div>

    <div class="search-area">
        <input type="text" class="search-bar" placeholder="O que você precisa hoje?" id="searchInput" oninput="filterAds()">
    </div>

    <div class="feed-container">
        <h2 class="section-header">Serviços do Condomínio</h2>
        <div id="adFeed">
            </div>
    </div>

    <script>
        // Configurações do Supabase
        const SB_URL = "https://lrksdcydpsvdqzmxildj.supabase.co";
        const SB_KEY = "sb_publishable_iNtDghLkTdaR_7ivvM3Ipw_HHijgbIL";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let allAds = [];

        // 🌡️ FUNÇÃO CLIMA (COORDENADAS NORTESHOPPING)
        async function updateWeather() {
            try {
                const lat = -22.8861; 
                const lon = -43.2835;
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=America/Sao_Paulo`);
                const data = await response.json();
                const w = data.current_weather;

                const codes = {
                    0: ["☀️", "Céu Limpo"], 1: ["🌤️", "Poucas Nuvens"], 2: ["⛅", "Nublado"], 3: ["☁️", "Encoberto"],
                    45: ["🌫️", "Nevoeiro"], 51: ["🌦️", "Garoa"], 61: ["🌧️", "Chuva"], 80: ["🌧️", "Pancadas de Chuva"], 95: ["⛈️", "Tempestade"]
                };

                const info = codes[w.weathercode] || ["🌡️", "Instável"];
                document.getElementById('weatherTemp').innerText = `${Math.round(w.temperature)}°C`;
                document.getElementById('weatherStatus').innerText = info[1];
                document.getElementById('weatherEmoji').innerText = info[0];
                document.getElementById('weatherArea').style.display = 'block';

                const options = { weekday: 'long', day: 'numeric', month: 'short' };
                const dt = new Intl.DateTimeFormat('pt-BR', options).format(new Date());
                document.getElementById('weatherDate').innerText = dt.charAt(0).toUpperCase() + dt.slice(1);
            } catch (e) { console.error("Erro clima", e); }
        }

        // 📋 CARREGAR ANÚNCIOS
        async function loadAds() {
            const { data, error } = await sb.from('anuncios').select('*').order('criado_em', { ascending: false });
            if (data) {
                allAds = data;
                renderAds(allAds);
            }
        }

        function renderAds(ads) {
            const feed = document.getElementById('adFeed');
            feed.innerHTML = ads.map(ad => `
                <div class="ad-card" onclick="window.open('https://wa.me/${ad.whatsapp}', '_blank')">
                    <img src="${ad.imagem_url || 'https://via.placeholder.com/80'}" class="ad-image">
                    <div class="ad-info">
                        <h3>${ad.titulo}</h3>
                        <p>${ad.descricao.substring(0, 60)}...</p>
                        <span style="font-size: 11px; color: var(--gold); font-weight: 700;">VER CONTATO</span>
                    </div>
                </div>
            `).join('');
        }

        function filterAds() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allAds.filter(ad => 
                ad.titulo.toLowerCase().includes(term) || 
                ad.descricao.toLowerCase().includes(term)
            );
            renderAds(filtered);
        }

        window.onload = () => {
            updateWeather();
            loadAds();
        };
    </script>
</body>
</html>
